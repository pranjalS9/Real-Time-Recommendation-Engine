# Server
server.port=8080

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Recommendation Engine
recommendation.top-n=10
recommendation.cache.ttl-minutes=10

# LSH Index
# Rule of thumb: 2^numHashBits should be ~5x fewer than item count
# 50 items → 4 bits (16 buckets → ~3 items/bucket)
lsh.num-hash-bits=4
lsh.vector-dimensions=500
