# Overrides for test environment
recommendation.top-n=5
recommendation.cache.ttl-minutes=1
lsh.num-hash-bits=4
lsh.vector-dimensions=100

# Disable reactive Redis auto-configuration — not needed, and it requires
# ReactiveRedisConnectionFactory which conflicts with our mocked connection factory
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
